<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마을 애니메이션</title>
    <link rel="stylesheet" href="css/village.css">
</head>
<body>
    <h4>look at this</h4>
    <h1>Have a Good Day !!</h1>
    <!-- 전체 마을 -->
    <section>
        <!-- 텍스트와 구름, 태양 배치 -->
         <article class="sky">
            <img src="img/sun.png" alt="태양" class="sun">
            <img src="img/cloud1.png" alt="구름1" class="cloud1">
            <img src="img/cloud2.png" alt="구름2" class="cloud2">
         </article>
         <!-- 마을 건물 배치 -->
          <article class="town">
            <img src="img/circle.png" alt="관람차" class="circle">
            <img src="img/town_night.png" alt=마을_밤" class="night">
            <img src="img/town_day.png" alt="마을_낮" class="day">
          </article>
          <!-- 마을 사람들 배치 -->
           <article class="people">
            <img src="img/man.png" alt="사람" class="man">
            <img src="img/family.png" alt="사람" class="family">
           </article>
    </section>
</body>
</html>
